:root {
  --bg: #f5f0eb; --card: #fffdf9; --ink: #2c1a0e; --muted: #9a7a62;
  --orange: #EA641D; --orange-light: #F79646; --beige: #ECE7E4;
  --beige-dark: #d4c5bc; --taupe: #b09080;
  --shadow: 0 4px 28px rgba(44,26,14,0.10); --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--ink);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 32px 16px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse at 20% 10%, rgba(234,100,29,0.07) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 90%, rgba(247,150,70,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.container { max-width: 620px; width: 100%; position: relative; z-index: 1; }

/* HEADER */
header { text-align: center; margin-bottom: 40px; }
.logo-zone { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 14px; }
.logo-hex {
  width: 58px; height: 58px; background: var(--orange);
  clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
  display: flex; align-items: center; justify-content: center; font-size: 26px;
  animation: float 3s ease-in-out infinite; flex-shrink: 0;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
h1 { font-family: 'Adopte', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); line-height: 1.15; }
h1 span { color: var(--orange); }
.subtitle { color: var(--muted); font-size: 0.92rem; margin-top: 6px; }
.spa-tag { display: inline-block; background: var(--orange); color: #fff; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; margin-top: 8px; }

/* PATTES PROGRESS */
.paw-progress { margin-bottom: 24px; }
.paw-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; }
.paw-track { display: flex; align-items: center; gap: 0; position: relative; height: 32px; }
.paw-track-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--beige); transform: translateY(-50%); border-radius: 2px; }
.paw-track-fill { position: absolute; top: 50%; left: 0; height: 2px; background: var(--orange); transform: translateY(-50%); border-radius: 2px; transition: width 0.5s ease; }
.paw-steps { display: flex; justify-content: space-between; width: 100%; position: relative; z-index: 1; }
.paw-step { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.4s ease; opacity: 0.25; filter: grayscale(1); }
.paw-step.done { opacity: 1; filter: none; animation: pawStamp 0.3s ease; }
.paw-step.current { opacity: 1; filter: none; animation: pawBounce 0.6s ease infinite alternate; }
@keyframes pawStamp { 0%{transform:scale(1.4) rotate(-15deg)} 100%{transform:scale(1) rotate(0deg)} }
@keyframes pawBounce { 0%{transform:translateY(0)} 100%{transform:translateY(-4px)} }

/* TRACKER avec portraits */
.tracker { background: var(--card); border-radius: var(--radius); padding: 16px 18px; border: 1.5px solid var(--beige); box-shadow: var(--shadow); margin-bottom: 18px; }
.tracker-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--taupe); margin-bottom: 12px; font-weight: 600; }
.cat-portraits { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; justify-content: center; }
.cat-portrait-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.5s ease; }
.cat-portrait-wrap.eliminated { opacity: 0.25; filter: grayscale(1); transform: scale(0.85); }
.cat-portrait-img {
  border-radius: 50%; object-fit: cover; border: 2.5px solid var(--orange);
  transition: all 0.5s ease; display: block;
}
.cat-portrait-wrap.eliminated .cat-portrait-img { border-color: var(--beige-dark); }
.cat-portrait-label { font-size: 0.6rem; color: var(--muted); text-align: center; max-width: 70px; line-height: 1.2; }
.cat-portrait-wrap.eliminated .cat-portrait-label { color: var(--beige-dark); text-decoration: line-through; }

/* QUESTION CARD */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 30px 26px; margin-bottom: 18px; border: 1.5px solid var(--beige); }
.slide-in { animation: slideIn 0.38s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.question-num { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
.question-text { font-family: 'Adopte', serif; font-size: 1.18rem; line-height: 1.45; margin-bottom: 6px; }
.question-note { font-size: 0.8rem; color: var(--muted); margin-bottom: 22px; font-style: italic; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { padding: 14px 18px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.16s ease; }
.btn-oui { background: rgba(234,100,29,0.08); color: var(--orange); border-color: rgba(234,100,29,0.3); }
.btn-oui:hover { background: rgba(234,100,29,0.15); border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(234,100,29,0.2); }
.btn-non { background: var(--beige); color: var(--taupe); border-color: var(--beige-dark); }
.btn-non:hover { background: var(--beige-dark); border-color: var(--taupe); transform: translateY(-2px); }
.btn:disabled { opacity: 0.45; cursor: default; transform: none !important; box-shadow: none !important; }

/* REVEAL */
.reveal-card { background: var(--card); border-radius: 22px; box-shadow: 0 8px 56px rgba(44,26,14,0.14); padding: 40px 28px; text-align: center; position: relative; overflow: hidden; border: 1.5px solid var(--beige); }
.reveal-card::before { content:''; position:absolute; top:0;left:0;right:0; height:5px; background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--taupe)); }
.drum-roll { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
.spinning-wheel { width: 100px; height: 100px; margin: 0 auto 20px; position: relative; }
.wheel-ring { width:100%;height:100%; border: 3px solid var(--beige); border-top-color: var(--orange); border-right-color: var(--orange-light); border-radius: 50%; animation: spin 0.55s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.wheel-center { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px; }
.pop-in { animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes popIn { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }

/* CAROUSEL COVERFLOW */
.carousel-wrap {
  position: relative; width: 100%; height: 200px;
  margin: 16px 0 12px; overflow: visible;
}
.carousel-stage {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.carousel-item {
  position: absolute;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
}
.carousel-item .c-img {
  border-radius: 50%; object-fit: cover;
  border: 3px solid var(--beige-dark);
  box-shadow: 0 2px 10px rgba(44,26,14,0.12);
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
  display: block;
}
.carousel-item.pos-center .c-img {
  width: 148px; height: 148px;
  border: 4px solid var(--orange);
  box-shadow: 0 8px 28px rgba(234,100,29,0.30);
}
.carousel-item.pos-side1 .c-img,
.carousel-item.pos-side2 .c-img {
  width: 90px; height: 90px;
  opacity: 0.75;
}
.carousel-item.pos-edge1 .c-img,
.carousel-item.pos-edge2 .c-img {
  width: 58px; height: 58px;
  opacity: 0.4;
}
.carousel-item.pos-hidden { opacity: 0; pointer-events: none; }
.carousel-item.pos-center { z-index: 5; transform: translateX(0) scale(1); }
.carousel-item.pos-side1  { z-index: 3; transform: translateX(-140px) scale(0.85); }
.carousel-item.pos-side2  { z-index: 3; transform: translateX(140px) scale(0.85); }
.carousel-item.pos-edge1  { z-index: 1; transform: translateX(-220px) scale(0.7); }
.carousel-item.pos-edge2  { z-index: 1; transform: translateX(220px) scale(0.7); }
.c-name {
  font-family: 'Adopte', serif; font-size: 0.82rem; color: var(--muted);
  text-align: center; transition: all 0.5s ease; white-space: nowrap;
}
.carousel-item.pos-center .c-name { font-size: 1.05rem; color: var(--orange); }
.carousel-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
.carousel-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--beige-dark); transition: all 0.3s; cursor: pointer; }
.carousel-dot.active { background: var(--orange); transform: scale(1.3); }
.carousel-nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; }
.carousel-btn { background: var(--beige); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 14px; color: var(--taupe); transition: all 0.2s; }
.carousel-btn:hover { background: var(--orange); color: #fff; }

.result-name { font-family: 'Adopte', serif; font-size: clamp(1.8rem,6vw,2.6rem); color: var(--orange); margin: 8px 0 6px; }
.result-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.65; max-width: 400px; margin: 0 auto 16px; }
.result-tags { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 16px; }
.result-tag { padding: 4px 13px; border-radius: 99px; background: var(--beige); color: var(--ink); font-size: 0.8rem; border: 1.5px solid var(--beige-dark); font-weight: 500; }
.result-note { background: rgba(234,100,29,0.07); border-left: 3px solid var(--orange); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 0.83rem; color: var(--ink); font-style: italic; margin: 0 auto 14px; max-width: 420px; text-align: left; }
.encart-benevoles { background: var(--orange); color: #fff; border-radius: 12px; padding: 14px 18px; font-size: 0.9rem; font-weight: 600; margin: 16px auto 0; max-width: 420px; line-height: 1.5; }
.btn-restart { background: var(--orange); color: #fff; border: none; padding: 13px 30px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(234,100,29,0.35); }
.btn-restart:hover { background: #d4561a; transform: translateY(-2px); }
.confetti-burst { position:absolute;inset:0;pointer-events:none;overflow:hidden; }
.cp { position:absolute;width:8px;height:8px;animation:cf linear forwards; }
@keyframes cf { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(520px) rotate(720deg);opacity:0} }
.btn-back { 
  background: none; border: none; color: var(--muted); 
  font-size: 0.82rem; cursor: pointer; padding: 8px 4px;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s; margin-top: 4px;
}
.btn-back:hover { color: var(--orange); }
.btn-back.invisible { visibility: hidden; pointer-events: none; }
.hidden { display:none !important; }
.single-result-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--orange); box-shadow: 0 6px 24px rgba(234,100,29,0.25); margin: 0 auto 10px; display: block; }
</style>

<div class="container">
  <header>
    <div class="logo-zone">
      <div class="logo-hex">🐾</div>
      <div>
        <h1>Quel chat pour<br><span>votre foyer ?</span></h1>
      </div>
    </div>
    <p class="subtitle">Répondez à 10 questions pour trouver votre compagnon idéal</p>

        <button id="btnOui" class="btn btn-oui" onclick="doAnswer(true)">✓ &nbsp;Oui</button>
        <button id="btnNon" class="btn btn-non" onclick="doAnswer(false)">✗ &nbsp;Non</button>
      </div>
      <button id="btnBack" class="btn-back invisible" onclick="doBack()">← Question précédente</button>
    </div>

  <div id="revealSection" class="hidden">
    <div class="reveal-card">
      <div id="confettiBurst" class="confetti-burst"></div>

        <div class="drum-roll">🥁 Roulement de tambour... 🥁</div>
        <div class="spinning-wheel"><div class="wheel-ring"></div><div class="wheel-center">🐱</div></div>
        <p style="color:var(--muted);font-size:0.88rem">Analyse de votre profil…</p>
      </div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-restart" onclick="doRestart()">🔄 Recommencer</button>
    </div>
  </div>
</div>

var currentStep = 0;
var reponseHistory = [];
var inLice = {};

function resetState() {
  currentStep = 0;
  reponseHistory = [];
  for (var i = 0; i < CATS.length; i++) inLice[CATS[i].id] = true;
}
function eliminer(liste) {
  for (var i = 0; i < liste.length; i++) inLice[liste[i]] = false;
}
function getActifs() {
  var r = [];
  for (var i = 0; i < CATS.length; i++) if (inLice[CATS[i].id]) r.push(CATS[i]);
  return r;
}
function nbActifs() {
  var n = 0;
  for (var i = 0; i < CATS.length; i++) if (inLice[CATS[i].id]) n++;
  return n;
}

// Build paw steps
function buildPawSteps() {
  var steps = document.getElementById('pawSteps');
  var html = '';
  for (var i = 0; i < QUESTIONS.length; i++) {
    // Alternate left/right paw
    var paw = i % 2 === 0 ? '🐾' : '🐾';
    html += '<div class="paw-step" id="paw'+i+'">'+paw+'</div>';
  }
  steps.innerHTML = html;
}

function majPaws() {
  var pct = Math.round((currentStep / QUESTIONS.length) * 100);
  document.getElementById('pawFill').style.width = Math.max(0, pct) + '%';
  document.getElementById('progressLabel').textContent = 'Question ' + (currentStep+1) + ' sur ' + QUESTIONS.length;
  for (var i = 0; i < QUESTIONS.length; i++) {
    var el = document.getElementById('paw'+i);
    if (!el) continue;
    el.className = 'paw-step';
    if (i < currentStep) el.classList.add('done');
    else if (i === currentStep) el.classList.add('current');
  }
}

function majPortraits() {
  var container = document.getElementById('catPortraits');
  var html = '';
  var actifs = getActifs();
  var total = CATS.length;
  var nbActif = nbActifs();
  
  // Compute sizes: bigger if more likely to survive
  // Min size 38px, max size 72px
  for (var i = 0; i < CATS.length; i++) {
    var c = CATS[i];
    var isActive = inLice[c.id];
    var score = CAT_SCORES[c.id] || 3;
    // Size based on score (2-5) → 44px to 70px
    var size = isActive ? Math.round(44 + (score - 2) * 8.7) : 40;
    var wrapClass = isActive ? 'cat-portrait-wrap' : 'cat-portrait-wrap eliminated';
    var img = CAT_IMGS[c.id] ? CAT_IMGS[c.id].small : '';
    html += '<div class="'+wrapClass+'" title="'+c.name+'">';
    if (img) {
      html += '<img class="cat-portrait-img" src="'+img+'" width="'+size+'" height="'+size+'" alt="'+c.name+'" style="width:'+size+'px;height:'+size+'px;">';
    }
    html += '<div class="cat-portrait-label">'+c.name+'</div>';
    html += '</div>';
  }
  container.innerHTML = html;
  
  var n = nbActif;
  document.getElementById('remainingLabel').textContent = n + ' type' + (n > 1 ? 's' : '') + ' en lice';
}

function majQuestion() {
  var q = QUESTIONS[currentStep];
  document.getElementById('qNum').textContent = 'Question ' + (currentStep+1) + ' sur ' + QUESTIONS.length;
  document.getElementById('qText').textContent = q.t;
  document.getElementById('qNote').textContent = q.n;
  majPaws();
  var card = document.getElementById('questionCard');
  card.classList.remove('slide-in');
  setTimeout(function() { card.classList.add('slide-in'); }, 10);
}

function doAnswer(isOui) {
  document.getElementById('btnOui').disabled = true;
  document.getElementById('btnNon').disabled = true;
  var snap = {};
  var ks = Object.keys(inLice);
  for (var ki = 0; ki < ks.length; ki++) snap[ks[ki]] = inLice[ks[ki]];
  reponseHistory.push({ step: currentStep, snap: snap });
  document.getElementById('btnBack').classList.remove('invisible');
  var q = QUESTIONS[currentStep];
  eliminer(isOui ? q.oui : q.non);
  majPortraits();
  currentStep++;
  if (currentStep >= QUESTIONS.length) {
    // Update paws to full
    document.getElementById('pawFill').style.width = '100%';
    for (var i = 0; i < QUESTIONS.length; i++) {
      var el = document.getElementById('paw'+i);
      if (el) { el.className = 'paw-step done'; }
    }
    setTimeout(afficherReveal, 400);
  } else {
    majQuestion();
    setTimeout(function() {
      document.getElementById('btnOui').disabled = false;
      document.getElementById('btnNon').disabled = false;
    }, 300);
  }
}

function afficherReveal() {
  document.getElementById('progressWrap').classList.add('hidden');
  document.getElementById('tracker').classList.add('hidden');
  document.getElementById('quizSection').classList.add('hidden');
  document.getElementById('revealContent').innerHTML =

    '<p style="color:var(--muted);font-size:0.88rem">Analyse de votre profil…</p>';
  document.getElementById('revealSection').classList.remove('hidden');
  setTimeout(montrerResultat, 2400);
}

function buildCarousel(actifs) {
  // Build stage with one item per cat, positions assigned dynamically
  var html = '<div class="carousel-wrap"><div class="carousel-stage" id="carStage">';
  for (var i = 0; i < actifs.length; i++) {
    var c = actifs[i];
    var img = CAT_IMGS[c.id] ? CAT_IMGS[c.id].large : '';
    html += '<div class="carousel-item" id="carItem'+i+'" onclick="goCarousel('+i+')">';
    if (img) html += '<img class="c-img" src="'+img+'" alt="'+c.name+'">';
    html += '<div class="c-name">'+c.emoji+' '+c.name+'</div>';
    html += '</div>';
  }
  html += '</div></div>';
  // Dots
  html += '<div class="carousel-dots" id="carDots">';
  for (var j = 0; j < actifs.length; j++) html += '<div class="carousel-dot'+(j===0?' active':'')+'" onclick="goCarousel('+j+')"></div>';
  html += '</div>';
  html += '<div class="carousel-nav"><button class="carousel-btn" onclick="prevCarousel()">◀</button><button class="carousel-btn" onclick="nextCarousel()">▶</button></div>';
  return html;
}

var carouselTotal = 0;

// Position classes based on distance from center (circular)
function posClass(dist, total) {
  // dist = signed distance from center (-2,-1,0,1,2)
  if (dist === 0) return 'pos-center';
  if (dist === -1 || (dist === total - 1)) return 'pos-side1';
  if (dist === 1 || (dist === -(total - 1))) return 'pos-side2';
  if (dist === -2 || (dist === total - 2)) return 'pos-edge1';
  if (dist === 2 || (dist === -(total - 2))) return 'pos-edge2';
  return 'pos-hidden';
}

function goCarousel(idx) {
  carouselIndex = idx;
  var total = carouselTotal;
  for (var i = 0; i < total; i++) {
    var el = document.getElementById('carItem' + i);
    if (!el) continue;
    // Signed distance: shortest path around the circle
    var dist = i - idx;
    if (dist > total / 2) dist -= total;
    if (dist < -total / 2) dist += total;
    el.className = 'carousel-item ' + posClass(dist, total);
  }
  var dots = document.querySelectorAll('.carousel-dot');
  for (var j = 0; j < dots.length; j++) {
    dots[j].className = 'carousel-dot' + (j === idx ? ' active' : '');
  }
}
function nextCarousel() {
  carouselIndex = (carouselIndex + 1) % carouselTotal;
  goCarousel(carouselIndex);
}
function prevCarousel() {
  carouselIndex = (carouselIndex - 1 + carouselTotal) % carouselTotal;
  goCarousel(carouselIndex);
}

function montrerResultat() {
  var actifs = getActifs();
  var html = '';
  var encart = '<div class="encart-benevoles">🐾 Merci d\'avoir participé !<br>N\'hésitez pas à venir poser vos questions aux bénévoles présents !</div>';
  var note = '<p class="result-note">💬 Il faut garder en tête que chaque animal a sa personnalité propre et peut ne pas suivre toutes les caractéristiques liées communément à sa race !</p>';

  if (actifs.length === 0) {
    html = '<div class="pop-in"><span style="font-size:64px;display:block;margin-bottom:8px">😿</span>' +
      '<p style="font-family:\'Adopte\',serif;font-size:1.3rem;color:var(--muted);margin:16px 0 10px">Aucun type ne correspond…</p>' +
      '<p class="result-desc"><strong>Cela ne veut pas dire que vous ne pourrez jamais adopter de chat !</strong></p>' +
      '<p class="result-desc">Il faut parfois reporter son projet d\'adoption ou le repenser afin de mettre le bien-être de l\'animal en priorité et pouvoir s\'assurer de répondre à tous ses besoins. Les bénévoles du Refuge SPA de Gennevilliers sont là pour vous accompagner dans cette réflexion.</p>' +
      encart + '</div>';

  } else if (actifs.length === 1) {
    var c = actifs[0]; var tags = '';
    for (var i = 0; i < c.traits.length; i++) tags += '<span class="result-tag">'+c.traits[i]+'</span>';
    var img = CAT_IMGS[c.id] ? CAT_IMGS[c.id].large : '';
    html = '<div class="pop-in">' +
      '<p style="font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Votre chat idéal est…</p>';
    if (img) html += '<img class="single-result-img" src="'+img+'" alt="'+c.name+'">';
    html += '<h2 class="result-name">'+c.name+'</h2>' +
      '<p class="result-desc">'+c.desc+'</p>' +
      '<div class="result-tags">'+tags+'</div>' +
      note +
      '<p class="result-desc" style="margin-top:10px">Venez rencontrer nos pensionnaires au Refuge SPA de Gennevilliers — nos bénévoles sont là pour vous aider à trouver votre compagnon idéal !</p>' +
      encart + '</div>';
    setTimeout(lanceConfettis, 200);

  } else {
    carouselIndex = 0;
    carouselTotal = actifs.length;
    html = '<div class="pop-in">' +
      '<p style="font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Plusieurs types vous correspondent !</p>' +
      buildCarousel(actifs) +
      note +
      '<p class="result-desc">Venez rencontrer nos pensionnaires au Refuge SPA de Gennevilliers pour trouver votre coup de cœur !</p>' +
      encart + '</div>';
    setTimeout(lanceConfettis, 200);
    // Init positions + auto-advance
    setTimeout(function() {
      goCarousel(0);
      if (carouselTimer) clearInterval(carouselTimer);
      carouselTimer = setInterval(nextCarousel, 2500);
    }, 100);
  }

  document.getElementById('revealContent').innerHTML = html;
}

function lanceConfettis() {
  var burst = document.getElementById('confettiBurst');
  if (!burst) return;
  var colors = ['#EA641D','#F79646','#ECE7E4','#b09080','#2c1a0e'];
  for (var i = 0; i < 55; i++) {
    (function(idx) {
      setTimeout(function() {
        var p = document.createElement('div');
        p.className = 'cp';
        p.style.left = (Math.random() * 100) + '%'; p.style.top = '-12px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        p.style.animationDuration = (0.9 + Math.random() * 1.3) + 's';
        burst.appendChild(p);
        setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 2600);
      }, idx * 35);
    })(i);
  }
}

function doBack() {
  if (reponseHistory.length === 0) return;
  var prev = reponseHistory.pop();
  currentStep = prev.step;
  var ks = Object.keys(prev.snap);
  for (var ki = 0; ki < ks.length; ki++) inLice[ks[ki]] = prev.snap[ks[ki]];
  if (reponseHistory.length === 0) {
    document.getElementById('btnBack').classList.add('invisible');
  }
  document.getElementById('btnOui').disabled = false;
  document.getElementById('btnNon').disabled = false;
  majPortraits();
  majQuestion();
}

function doRestart() {
  if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
  resetState();
  document.getElementById('revealSection').classList.add('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('tracker').classList.remove('hidden');
  document.getElementById('quizSection').classList.remove('hidden');
  document.getElementById('btnOui').disabled = false;
  document.getElementById('btnNon').disabled = false;
  document.getElementById('btnBack').classList.add('invisible');
  buildPawSteps(); majPaws(); majPortraits(); majQuestion();
}

// Init
resetState(); buildPawSteps(); majPaws(); majPortraits(); majQuestion();
</script>
</body>
</html>
